<!DOCTYPE html>
<html lang="te">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emp One - AAR</title>

    <!-- Telugu & English Fonts (Google Fonts) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mandali&family=Noto+Sans+Telugu:wght@100..900&family=Baloo+Tammudu+2:wght@400..800&family=Suranna&family=Gidugu&family=Anek+Telugu:wght@100..800&display=swap"
      rel="stylesheet"
    />

    <!-- Suppress Google Translate toolbar / banner entirely -->
    <style>
      .goog-te-banner-frame.skiptranslate,
      .goog-te-banner-frame,
      #goog-gt-tt,
      .goog-te-balloon-frame,
      .goog-tooltip,
      .goog-tooltip:hover,
      div#goog-gt-tt,
      .goog-te-gadget img,
      .goog-te-gadget > span {
        display: none !important;
      }
      #google_translate_element { display: none; visibility: hidden; }
      body { top: 0px !important; }
      .goog-text-highlight {
        background-color: transparent !important;
        box-shadow: none !important;
      }
      /* Applied Telugu font via JS – fallback here */
      [data-telugu-active="true"] body {
        font-family: 'Noto Sans Telugu', sans-serif;
      }
    </style>

    <!-- Google Translate element (hidden – controlled via custom UI) -->
    <div id="google_translate_element"></div>

    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,te',
            autoDisplay: false,
            layout: google.translate.TranslateElement.InlineLayout.SIMPLE
          },
          'google_translate_element'
        );
      }
    </script>
    <script
      type="text/javascript"
      src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
      async
    ></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
